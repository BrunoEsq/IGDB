<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Colección de Juegos - GameTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital@0;1&display=swap" rel="stylesheet">
    <style>
        * {
            scrollbar-color: #D4A574 #1a1410;
            scrollbar-width: thin;
        }

        body {
            background: linear-gradient(135deg, #0f0e0a 0%, #1a1410 50%, #0f0e0a 100%);
            font-family: 'Crimson Text', serif;
            color: #e8d4a2;
            position: relative;
            overflow-x: hidden;
        }

        /* Fondo decorativo con patrón sutil */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(212, 165, 116, 0.03) 2px, rgba(212, 165, 116, 0.03) 4px);
            pointer-events: none;
            z-index: -1;
        }

        /* Barra de navegación estilo Zelda */
        .zelda-nav {
            background: linear-gradient(180deg, #2a1810 0%, #1a0f08 100%);
            border-bottom: 3px solid #D4A574;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(212, 165, 116, 0.2);
            position: relative;
        }

        .zelda-nav::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #D4A574, transparent);
        }

        /* Logo con efecto Triforce */
        .zelda-logo {
            font-family: 'Cinzel', serif;
            font-weight: 900;
            font-size: 1.75rem;
            background: linear-gradient(135deg, #D4A574, #E8D4A2, #D4A574);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(212, 165, 116, 0.5);
            letter-spacing: 2px;
        }

        /* Botones de navegación */
        .nav-btn {
            font-family: 'Cinzel', serif;
            color: #c9a85a;
            transition: all 0.3s ease;
            position: relative;
            padding: 0.75rem 1.5rem;
            border: 1px solid transparent;
            border-radius: 2px;
        }

        .nav-btn:hover {
            color: #D4A574;
            background: rgba(212, 165, 116, 0.15);
            border: 1px solid #D4A574;
            box-shadow: 0 0 15px rgba(212, 165, 116, 0.4), inset 0 0 15px rgba(212, 165, 116, 0.1);
            transform: translateY(-2px);
        }

        .nav-btn-primary {
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
            color: #F5DEB3;
            border: 2px solid #D4A574;
            border-radius: 4px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .nav-btn-primary:hover {
            background: linear-gradient(135deg, #A0522D 0%, #CD853F 100%);
            box-shadow: 0 6px 20px rgba(212, 165, 116, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
            color: #FFFACD;
        }

        /* Secciones con tema medieval */
        .section-content {
            display: none;
            animation: fadeIn 0.6s ease-in-out;
        }

        .section-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Títulos de sección */
        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #D4A574, #F5DEB3, #D4A574);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 30px rgba(212, 165, 116, 0.3);
        }

        .section-subtitle {
            color: #c9a85a;
            font-size: 1.1rem;
            font-style: italic;
            margin-bottom: 2rem;
        }

        /* Decoración de línea */
        .decoration-line {
            height: 3px;
            background: linear-gradient(90deg, transparent, #D4A574, transparent);
            margin: 1.5rem 0;
            border-radius: 2px;
        }

        /* Tarjetas de juegos - Estilo Zelda */
        .game-card {
            position: relative;
            border: 2px solid #D4A574;
            border-radius: 8px;
            overflow: hidden;
            background: linear-gradient(135deg, #2a1810 0%, #1a0f08 100%);
            transition: all 0.4s ease;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.6),
                inset 0 0 20px rgba(212, 165, 116, 0.05);
            group-hover: scale(1.03);
        }

        .game-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 
                0 20px 50px rgba(212, 165, 116, 0.4),
                inset 0 0 30px rgba(212, 165, 116, 0.1),
                0 0 40px rgba(212, 165, 116, 0.3);
            border-color: #F5DEB3;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #D4A574, transparent);
            z-index: 10;
        }

        .game-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.4s ease;
        }

        .game-card:hover img {
            filter: brightness(1.1) contrast(1.1);
        }

        /* Rating badge */
        .rating-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: linear-gradient(135deg, #D4A574, #F5DEB3);
            color: #1a0f08;
            font-weight: 800;
            padding: 0.5rem 0.75rem;
            border-radius: 4px;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
            border: 2px solid #8B4513;
            font-family: 'Cinzel', serif;
            z-index: 20;
        }

        /* Medal badges */
        .medal-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.5rem;
            z-index: 20;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.8), inset 0 2px 5px rgba(255, 255, 255, 0.2);
            font-family: 'Cinzel', serif;
            border: 2px solid;
        }

        .medal-1 {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #8B4500;
            border-color: #FFD700;
        }

        .medal-2 {
            background: linear-gradient(135deg, #C0C0C0, #A9A9A9);
            color: #2F4F4F;
            border-color: #C0C0C0;
        }

        .medal-3 {
            background: linear-gradient(135deg, #CD7F32, #8B4513);
            color: #FFB90F;
            border-color: #CD7F32;
        }

        /* Game info container */
        .game-info {
            padding: 1.25rem;
            background: linear-gradient(180deg, rgba(42, 24, 16, 0.9), rgba(26, 15, 8, 0.95));
            border-top: 1px solid rgba(212, 165, 116, 0.3);
        }

        .game-title {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            color: #E8D4A2;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }

        .game-status {
            font-size: 0.9rem;
            color: #a89060;
            font-style: italic;
        }

        /* Formulario de búsqueda */
        .search-box {
            background: linear-gradient(135deg, #2a1810 0%, #1a0f08 100%);
            border: 2px solid #D4A574;
            border-radius: 4px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(212, 165, 116, 0.05);
        }

        .search-input {
            background: rgba(212, 165, 116, 0.05);
            border: 2px solid #D4A574;
            color: #E8D4A2;
            padding: 0.75rem 1rem;
            border-radius: 4px;
            font-family: 'Crimson Text', serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: #8B6F47;
        }

        .search-input:focus {
            outline: none;
            border-color: #F5DEB3;
            background: rgba(212, 165, 116, 0.1);
            box-shadow: 0 0 20px rgba(212, 165, 116, 0.4);
        }

        .search-btn {
            background: linear-gradient(135deg, #8B4513 0%, #CD853F 100%);
            color: #FFFACD;
            border: 2px solid #D4A574;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            font-weight: 600;
            font-family: 'Cinzel', serif;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        .search-btn:hover {
            background: linear-gradient(135deg, #CD853F 0%, #DAA520 100%);
            box-shadow: 0 6px 20px rgba(212, 165, 116, 0.6);
            transform: translateY(-2px);
        }

        /* Rating form */
        .rating-form {
            background: linear-gradient(135deg, #2a1810 0%, #1a0f08 100%);
            border: 2px solid #D4A574;
            border-radius: 4px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(212, 165, 116, 0.1);
        }

        .rating-form-title {
            font-family: 'Cinzel', serif;
            color: #F5DEB3;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .rating-input {
            background: rgba(212, 165, 116, 0.05);
            border: 2px solid #D4A574;
            color: #FFD700;
            padding: 0.75rem 1rem;
            border-radius: 4px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .rating-input:focus {
            outline: none;
            border-color: #FFD700;
            background: rgba(212, 165, 116, 0.1);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        /* Loading animation */
        .loading {
            color: #D4A574;
            text-align: center;
            font-size: 1.2rem;
            padding: 2rem;
        }

        .loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Search results */
        .search-result {
            background: linear-gradient(135deg, rgba(42, 24, 16, 0.9), rgba(26, 15, 8, 0.95));
            border: 1px solid #D4A574;
            border-radius: 4px;
            padding: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .search-result:hover {
            background: linear-gradient(135deg, rgba(52, 34, 26, 0.95), rgba(42, 25, 15, 1));
            border-color: #F5DEB3;
            box-shadow: 0 0 20px rgba(212, 165, 116, 0.4);
            transform: translateX(5px);
        }

        .search-result img {
            width: 60px;
            height: 80px;
            object-fit: cover;
            border: 2px solid #D4A574;
            border-radius: 3px;
        }

        .search-result-title {
            font-family: 'Cinzel', serif;
            color: #E8D4A2;
            font-weight: 600;
        }

        /* Delete button */
        .delete-btn {
            background: linear-gradient(135deg, #8B0000, #DC143C);
            color: #FFB6C1;
            border: 1px solid #FF69B4;
            padding: 0.5rem 1rem;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-family: 'Cinzel', serif;
            width: 100%;
            text-align: left;
        }

        .delete-btn:hover {
            background: linear-gradient(135deg, #DC143C, #FF1493);
            box-shadow: 0 0 15px rgba(220, 20, 60, 0.6);
            transform: translateX(-3px);
        }

        /* Save button */
        .save-btn {
            background: linear-gradient(135deg, #228B22 0%, #32CD32 100%);
            color: #FFFACD;
            border: 2px solid #90EE90;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            font-weight: 700;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        .save-btn:hover {
            background: linear-gradient(135deg, #32CD32 0%, #3CB371 100%);
            box-shadow: 0 6px 20px rgba(50, 205, 50, 0.6);
            transform: translateY(-2px);
        }

        /* Error messages */
        .error-message {
            color: #FF6B6B;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid #FF6B6B;
            padding: 1rem;
            border-radius: 4px;
            text-align: center;
            font-weight: 600;
        }

        /* Empty state */
        .empty-state {
            color: #a89060;
            text-align: center;
            padding: 2rem;
            font-style: italic;
            font-size: 1.1rem;
        }
    </style>
</head>

<body class="min-h-screen pb-10">

    <!-- Navegación -->
    <nav class="zelda-nav fixed w-full z-50 top-0">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="zleda-logo flex items-center gap-2">
                <i class="fas fa-crown text-3xl" style="color: #D4A574;"></i>
                <span class="zelda-logo">GAME TRACKER</span>
            </div>
            <div class="flex space-x-4">
                <button onclick="showSection('home')" class="nav-btn">
                    <i class="fas fa-home mr-1"></i>Inicio
                </button>
                <button onclick="showSection('catalog')" class="nav-btn">
                    <i class="fas fa-book mr-1"></i>Catálogo
                </button>
                <button onclick="showSection('add')" class="nav-btn-primary">
                    <i class="fas fa-plus mr-1"></i>Añadir Juego
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 mt-32">

        <!-- SECCIÓN: HOME (TOP 3) -->
        <section id="home" class="section-content active">
            <div class="mb-8">
                <h1 class="section-title">⚔️ Mi Top 3 Histórico</h1>
                <p class="section-subtitle">Los legendarios juegos que he completado...</p>
                <div class="decoration-line"></div>
            </div>
            <div id="top-games-container" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            </div>
        </section>

        <!-- SECCIÓN: CATÁLOGO -->
        <section id="catalog" class="section-content">
            <div class="mb-8">
                <h1 class="section-title">📖 Mi Gran Catálogo</h1>
                <p class="section-subtitle">Todos los juegos que he conquistado...</p>
                <div class="decoration-line"></div>
            </div>
            <div id="catalog-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            </div>
        </section>

        <!-- SECCIÓN: AÑADIR JUEGO -->
        <section id="add" class="section-content max-w-3xl mx-auto">
            <div class="mb-8 text-center">
                <h1 class="section-title">🔍 Buscar Nuevo Juego</h1>
                <p class="section-subtitle">Descubre y registra tu próxima aventura...</p>
                <div class="decoration-line"></div>
            </div>

            <div class="search-box mb-6">
                <div class="flex gap-2 mb-4">
                    <input type="text" id="search-input" 
                        placeholder="Ej. The Witcher 3, Hollow Knight, Zelda..."
                        class="flex-1 search-input">
                    <button onclick="searchGame()" class="search-btn">
                        <i class="fas fa-search"></i>
                    </button>
                </div>

                <div id="loading" class="hidden loading">
                    <i class="fas fa-spinner"></i> Buscando en los reinos...
                </div>

                <div id="search-results" class="grid grid-cols-1 gap-3 max-h-96 overflow-y-auto">
                </div>
            </div>

            <div id="rating-form" class="hidden rating-form">
                <h3 class="rating-form-title" id="selected-game-name">
                    <i class="fas fa-star"></i> Valorar Juego
                </h3>
                <div class="flex items-end gap-4 mt-4">
                    <div class="flex-1">
                        <label class="block text-sm text-c9a85a mb-1" style="color: #c9a85a;">Mi Nota (0 a 10):</label>
                        <input type="number" id="game-rating" min="0" max="10" step="0.1" placeholder="9.5"
                            class="w-full rating-input">
                    </div>
                    <button onclick="saveGame()" class="save-btn h-12">
                        <i class="fas fa-check mr-1"></i> Guardar
                    </button>
                </div>
            </div>
        </section>

    </main>

    <script>
        // Placeholder SVG local
        const PLACEHOLDER_IMAGE = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%22200%22%3E%3Crect fill=%22%232a1810%22 width=%22150%22 height=%22200%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-size=%2214%22 fill=%22%23D4A574%22 text-anchor=%22middle%22 dy=%22.3em%22 font-family=%22Cinzel%22%3ESin Portada%3C/text%3E%3C/svg%3E';

        let myGames = JSON.parse(localStorage.getItem('mySavedGames')) || [];
        let selectedGameToSave = null;

        function showSection(sectionId) {
            document.querySelectorAll('.section-content').forEach(sec => sec.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            if (sectionId === 'home') renderHome();
            if (sectionId === 'catalog') renderCatalog();
        }

        function renderHome() {
            const container = document.getElementById('top-games-container');
            container.innerHTML = '';

            if (myGames.length === 0) {
                container.innerHTML = '<p class="empty-state col-span-3">Aún no has conquistado ningún juego. ¡Inicia tu aventura en "Añadir Juego"!</p>';
                return;
            }

            const topGames = [...myGames].sort((a, b) => b.rating - a.rating).slice(0, 3);

            topGames.forEach((game, index) => {
                const medalClass = ['medal-1', 'medal-2', 'medal-3'][index];
                const medalSymbol = ['👑', '🥈', '🥉'][index];

                const card = document.createElement('div');
                card.className = 'game-card relative h-80 overflow-hidden group';
                card.innerHTML = `
                    <div class="medal-badge ${medalClass}">
                        ${medalSymbol}
                    </div>
                    <div class="rating-badge">
                        ${game.rating}★
                    </div>
                    <img src="${game.image}" alt="${game.name}" class="w-full h-full object-cover" onerror="this.src='${PLACEHOLDER_IMAGE}'">
                    <div class="game-info absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black via-black/80 to-transparent p-4">
                        <h3 class="game-title">${game.name}</h3>
                        <p class="game-status"><i class="fas fa-check-circle mr-1"></i>Completado</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderCatalog() {
            const container = document.getElementById('catalog-container');
            container.innerHTML = '';

            if (myGames.length === 0) {
                container.innerHTML = '<p class="empty-state col-span-full">Tu catálogo está vacío. ¡Comienza a explorar!</p>';
                return;
            }

            [...myGames].reverse().forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card relative h-64 overflow-hidden';
                card.innerHTML = `
                    <div class="rating-badge">
                        ${game.rating}★
                    </div>
                    <img src="${game.image}" alt="${game.name}" class="w-full h-full object-cover" onerror="this.src='${PLACEHOLDER_IMAGE}'">
                    <div class="game-info absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black via-black/80 to-transparent">
                        <h3 class="game-title truncate">${game.name}</h3>
                        <button class="delete-btn mt-2">
                            <i class="fas fa-trash mr-1"></i> Eliminar
                        </button>
                    </div>
                `;
                
                const deleteBtn = card.querySelector('.delete-btn');
                deleteBtn.addEventListener('click', () => deleteGame(game.id));
                container.appendChild(card);
            });
        }

        async function searchGame() {
            const query = document.getElementById('search-input').value;
            if (!query) return;

            const resultsContainer = document.getElementById('search-results');
            const loading = document.getElementById('loading');
            const ratingForm = document.getElementById('rating-form');

            resultsContainer.innerHTML = '';
            ratingForm.classList.add('hidden');
            loading.classList.remove('hidden');

            try {
                const response = await fetch('/api/searchGames', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                loading.classList.add('hidden');
                const responseText = await response.text();
                
                if (!response.ok) {
                    throw new Error(`Error ${response.status}: ${response.statusText}`);
                }

                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (e) {
                    throw new Error('Respuesta del servidor inválida');
                }

                if (!Array.isArray(data)) throw new Error('Formato inesperado');
                if (data.length === 0) {
                    resultsContainer.innerHTML = '<p class="error-message col-span-full">No encontramos ese juego legendario...</p>';
                    return;
                }

                data.forEach(game => {
                    let imageUrl = PLACEHOLDER_IMAGE;
                    if (game.cover && game.cover.url) {
                        imageUrl = 'https:' + game.cover.url.replace('t_thumb', 't_cover_big');
                    }

                    const result = document.createElement('div');
                    result.className = 'search-result';
                    result.innerHTML = `
                        <img src="${imageUrl}" onerror="this.src='${PLACEHOLDER_IMAGE}'">
                        <div class="flex-1">
                            <h4 class="search-result-title">${game.name}</h4>
                        </div>
                        <i class="fas fa-arrow-right" style="color: #D4A574;"></i>
                    `;
                    result.addEventListener('click', () => selectGame(game.id, game.name, imageUrl));
                    resultsContainer.appendChild(result);
                });
            } catch (error) {
                loading.classList.add('hidden');
                resultsContainer.innerHTML = `<p class="error-message col-span-full"><i class="fas fa-exclamation-triangle mr-1"></i>${error.message}</p>`;
            }
        }

        function selectGame(id, name, image) {
            selectedGameToSave = { id, name, image };
            const ratingForm = document.getElementById('rating-form');
            const selectedNameDisplay = document.getElementById('selected-game-name');
            
            selectedNameDisplay.innerHTML = `<img src="${image}" class="w-8 h-8 rounded-full border border-D4A574 inline-block mr-2" onerror="this.src='${PLACEHOLDER_IMAGE}'"> ${name}`;
            document.getElementById('search-results').innerHTML = '';
            document.getElementById('search-input').value = '';
            ratingForm.classList.remove('hidden');
            document.getElementById('game-rating').focus();
        }

        function saveGame() {
            const ratingInput = document.getElementById('game-rating');
            const rating = parseFloat(ratingInput.value);

            if (isNaN(rating) || rating < 0 || rating > 10) {
                alert("⚠️ Por favor, introduce una nota válida entre 0 y 10.");
                return;
            }

            if (myGames.find(g => g.id === selectedGameToSave.id)) {
                alert("⚠️ ¡Ya tienes este juego en tu catálogo!");
                return;
            }

            selectedGameToSave.rating = rating;
            myGames.push(selectedGameToSave);
            localStorage.setItem('mySavedGames', JSON.stringify(myGames));

            document.getElementById('rating-form').classList.add('hidden');
            ratingInput.value = '';
            selectedGameToSave = null;
            showSection('catalog');
        }

        function deleteGame(id) {
            if (confirm('¿Deseas eliminar este juego de tu legado?')) {
                myGames = myGames.filter(game => game.id !== id);
                localStorage.setItem('mySavedGames', JSON.stringify(myGames));
                renderCatalog();
            }
        }

        renderHome();
    </script>
</body>

</html>
